services:
  postgres-db:
    image: postgres:15-alpine
    ports: 
      - 5432:5432
    env_file:
      - local.config
    volumes:
      - "./postgres-data:/var/lib/postgresql/data"

  go-app:
    build: .
    env_file:
      - local.config
    depends_on:
      - postgres-db

volumes:
  postgres-data: